replicaCount: 1

image:
  repository: docker.io/lmsysorg/sglang
  tag: v0.5.9-cu130-runtime
  pullPolicy: IfNotPresent

model:
  name: Qwen/Qwen2.5-0.5B-Instruct
  memFraction: 0.10

service:
  type: NodePort
  port: 80
  targetPort: 30000

resources:
  limits:
    cpu: "4"
    memory: "16Gi"
    nvidia.com/gpu: "1"
  requests:
    cpu: "2"
    memory: "8Gi"

runtimeClass:
  enabled: true
  name: nvidia

pvc:
  enabled: true
  accessModes:
    - ReadWriteOnce
  size: 20Gi
  storageClassName: ""
