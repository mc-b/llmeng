apiVersion: apps/v1
kind: Deployment
metadata:
  name: intake-api
  namespace: autoshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: intake-api
  template:
    metadata:
      labels:
        app: intake-api
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "intake-api"
        dapr.io/app-port: "8080"
    spec:
      containers:
        - name: intake-api
          image: YOUR_REGISTRY/autoshop-intake:0.1.0
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: intake-api
  namespace: autoshop
spec:
  selector:
    app: intake-api
  ports:
    - port: 8080
      targetPort: 8080
---
