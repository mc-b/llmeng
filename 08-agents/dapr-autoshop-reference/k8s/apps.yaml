apiVersion: apps/v1
kind: Deployment
metadata:
  name: diagnosis-agent
  namespace: autoshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: diagnosis-agent
  template:
    metadata:
      labels:
        app: diagnosis-agent
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "diagnosis-agent"
        dapr.io/app-port: "8082"
    spec:
      containers:
        - name: diagnosis-agent
          image: YOUR_REGISTRY/autoshop-diagnosis:0.1.0
          ports:
            - containerPort: 8082
          env:
            - name: CONVERSATION_COMPONENT
              value: llm-provider
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8082
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: diagnosis-agent
  namespace: autoshop
spec:
  selector:
    app: diagnosis-agent
  ports:
    - port: 8082
      targetPort: 8082
---
